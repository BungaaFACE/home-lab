.compose_deploy_template:
  tags:
    - shell
  stage: deploy
  script:
    - test -f "${COMPOSE_FILE}.template" && envsubst < "${COMPOSE_FILE}.template" > "${COMPOSE_FILE}" || echo "::warn::Файл ${COMPOSE_FILE}.template не найден"
    - mkdir -p "${COMPOSE_PATH}"
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" down || true
    - cp "${CI_PROJECT_DIR}/${COMPOSE_FILE}" "${COMPOSE_PATH}/${COMPOSE_FILE}"
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" pull
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" up -d
  when: manual
  allow_failure: true

.envsubst_nginx_template:
  tags:
    - shell
  stage: build
  before_script:
    - test -f "${NGINX_FILE}.template" && envsubst < "${NGINX_FILE}.template" > "${NGINX_FILE}" || echo "::warn::Файл ${NGINX_FILE}.template не найден"
  when: manual
  allow_failure: true
