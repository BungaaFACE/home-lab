.compose_deploy_template:
  tags:
    - shell
  stage: deploy
  script:
    - test -f "${COMPOSE_FILE_DIR}${COMPOSE_FILE}.template" && export VARS=$(printf '${%s} ' $(env | cut -d= -f1 | grep '^[a-zA-Z]')) && envsubst "$VARS" < "${COMPOSE_FILE_DIR}${COMPOSE_FILE}.template" > "${COMPOSE_FILE}" || echo "::warn::Файл ${COMPOSE_FILE}.template не найден"
    - mkdir -p "${COMPOSE_PATH}"
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" down || true
    - cp "${CI_PROJECT_DIR}/${COMPOSE_FILE}" "${COMPOSE_PATH}/${COMPOSE_FILE}"
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" pull
    - docker compose -f "${COMPOSE_PATH}/${COMPOSE_FILE}" up -d

.nginx_site_deploy_template:
  tags:
    - shell
  after_script:
    - test -f "${NGINX_FILE_DIR}${NGINX_FILE}.template" && export VARS=$(printf '${%s} ' $(env | cut -d= -f1 | grep '^[a-zA-Z]')) && envsubst "$VARS" < "${NGINX_FILE_DIR}${NGINX_FILE}.template" > "${NGINX_FILE_DIR}${NGINX_FILE}" || echo "::warn::Файл ${NGINX_FILE_DIR}${NGINX_FILE}.template не найден"
    - cp "${NGINX_FILE_DIR}${NGINX_FILE}" "${SITES_PATH}/${NGINX_FILE}"
    - docker kill --signal=HUP nginx

.triggered_template:
  rules:
    - if: $TRIGGER_ACTION == $CI_JOB_NAME
    - if: $TRIGGER_ACTION
      when: never
    - when: manual