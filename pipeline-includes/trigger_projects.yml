.trigger_template:
  needs: []
  variables:
    TRIGGER_ACTION: "$CI_JOB_NAME"
  rules:
    - when: manual

#########################################################
# REPO-COPPIER https://gitlab.com/BungaaFACE/repo-coppier
#########################################################
build_repo_coppier:
  extends: .trigger_template
  stage: build
  trigger:
    project: BungaaFACE/repo-coppier
    branch: main
    strategy: depend

deploy_repo_coppier:
  extends: .trigger_template
  stage: deploy
  trigger:
    project: BungaaFACE/repo-coppier
    branch: main
    strategy: depend

sync_repo_coppier:
  extends: .trigger_template
  stage: misc
  trigger:
    project: BungaaFACE/repo-coppier
    branch: main
    strategy: depend
#########################################################

#########################################################
# BUNGAACORD https://gitlab.com/BungaaFACE/BungaaCord
#########################################################
build_bungaacord_backend:
  extends: .trigger_template
  stage: build
  trigger:
    project: BungaaFACE/BungaaCord
    branch: main
    strategy: depend

build_bungaacord_frontend:
  extends: .trigger_template
  stage: build
  trigger:
    project: BungaaFACE/BungaaCord
    branch: main
    strategy: depend

deploy_bungaacord_backend:
  extends: .trigger_template
  stage: deploy
  trigger:
    project: BungaaFACE/BungaaCord
    branch: main
    strategy: depend

deploy_bungaacord_frontend:
  extends: .trigger_template
  stage: deploy
  trigger:
    project: BungaaFACE/BungaaCord
    branch: main
    strategy: depend
#########################################################